# =============================================================================
# Proyecto ETL RSN - Data Warehouse Local (Fase 3)
# =============================================================================
# Levanta un stack de PostgreSQL (DW) + pgAdmin para administración visual.
# SEGURIDAD: Las credenciales se leen desde un archivo .env (nunca hardcodeadas).
# Ejecutar: sudo docker compose --env-file ../.env up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — Data Warehouse principal
  # ---------------------------------------------------------------------------
  postgres_dw:
    image: postgres:16-alpine
    container_name: rsn_postgres_dw
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DW_DB_NAME}
      POSTGRES_USER:     ${DW_DB_USER}
      POSTGRES_PASSWORD: ${DW_DB_PASSWORD}
    ports:
      # Expuesto solo en localhost para minimizar superficie de ataque, se va a poner en producción?
      - "127.0.0.1:5432:5432"
    volumes:
      # Script DDL que se ejecuta automáticamente en el primer arranque
      - ../db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      # Volumen persistente para los datos
      - postgres_dw_data:/var/lib/postgresql/data
    networks:
      - rsn_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DW_DB_USER} -d ${DW_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # PostgreSQL — Base de datos reacional FDSN
  # ---------------------------------------------------------------------------
  postgres_RDB:
    image: postgres:16-alpine
    container_name: fdsn_postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${RDB_DB_NAME}
      POSTGRES_USER:     ${RDB_DB_USER}
      POSTGRES_PASSWORD: ${RDB_DB_PASSWORD}
    ports:
      # Expuesto solo en localhost y mapeado al puerto de la maquina 5433
      - "127.0.0.1:5433:5432"
    volumes:
      # importar .txt a docker
      - ../data:/import
      # Script DDL que se ejecuta automáticamente en el primer arranque
      - ../db/init-2.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      # Volumen persistente para los datos
      - postgres_rdb_data:/var/lib/postgresql/data
    networks:
      - rsn_network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RDW_DB_USER} -d ${RDW_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # pgAdmin 4 — Interfaz web de administración de la base de datos, para ver los datos bien lindos
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: rsn_pgadmin
    restart: unless-stopped
    depends_on:
      postgres_dw:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      # Deshabilita la telemetría de pgAdmin
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "True"
      PGADMIN_CONFIG_ALLOW_SPECIAL_EMAIL_DOMAINS: '"local"'
      PGADMIN_CONFIG_LOGIN_BANNER: '"Acceso restringido — Solo uso interno RSN"'
      PGADMIN_CONFIG_CONSOLE_LOG_LEVEL: 40
    ports:
      # Acceder en http://localhost:5050
      - "127.0.0.1:5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - rsn_network

  # ---------------------------------------------------------------------------
  # Apache Superset — Plataforma avanzada de BI
  # ---------------------------------------------------------------------------
  superset:
    image: apache/superset:latest
    container_name: rsn_superset
    restart: unless-stopped
    ports:
      # Acceder en http://localhost:8088
      - "127.0.0.1:8088:8088"
    environment:
      SUPERSET_SECRET_KEY: "rsn-proyecto-secreto-cambiar"
    networks:
      - rsn_network
    depends_on:
      postgres_dw:
        condition: service_healthy

# =============================================================================
# Redes
# =============================================================================
networks:
  rsn_network:
    driver: bridge
    name: rsn_network

# =============================================================================
# Volúmenes persistentes
# =============================================================================
volumes:
  postgres_dw_data:
    name: rsn_postgres_dw_data
  postgres_rdb_data:
    name: fdsn_postgres_rdb_data
  pgadmin_data:
    name: rsn_pgadmin_data